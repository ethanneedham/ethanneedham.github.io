<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethan Needham</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 2rem;
        }

        .container {
            max-width: 700px;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: 700;
            letter-spacing: 0.08em;
            margin-bottom: 1rem;
        }

        .subtitle {
            font-size: 1.2rem;
            opacity: 0.8;
            margin-bottom: 2rem;
            letter-spacing: 0.05em;
        }

        .coming-soon {
            font-size: 1rem;
            opacity: 0.65;
            margin-bottom: 2.5rem;
        }

        .links {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .links a {
            color: white;
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.25);
            padding: 0.75rem 1.25rem;
            border-radius: 999px;
            transition: all 0.2s ease;
        }

        .links a:hover {
            border-color: white;
            transform: translateY(-2px);
        }

        footer {
            margin-top: 3rem;
            font-size: 0.9rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>ETHAN NEEDHAM</h1>

        <p class="subtitle">
            Artist • Producer • Songwriter
        </p>

        <p class="coming-soon">
            New website currently under construction.<br>
            Full portfolio, music, press kit, and contact information coming soon.
        </p>

        <div class="links">
            <a href="https://instagram.com/ethanneedham" target="_blank">Instagram</a>
            <a href="https://youtube.com/@ethan.needham" target="_blank">YouTube</a>
            <a href="https://tiktok.com/@ethan.needham" target="_blank">TikTok</a>
            <a href="mailto:hello@ethanneedham.com">Contact</a>
        </div>

        <footer>
            © 2026 Ethan Needham
        </footer>
    </div>

</body>
</html>
